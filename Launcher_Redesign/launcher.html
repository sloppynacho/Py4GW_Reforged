<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Py4GW Launcher — visual identity</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Cinzel:wght@600;700&family=Spectral:wght@400;500;600&family=Chakra+Petch:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{ /* Indigo Aurora (default) */
  --font-ui:'Sora',system-ui,sans-serif; --font-mono:'JetBrains Mono',monospace; --font-display:'Sora',sans-serif;
  --bg:#0d0f1f; --surface:#14162b; --panel:#1c1f3a; --panel2:#242847; --rail:#101226;
  --border:#2a2f55; --border-soft:#20233f;
  --text:#e6e8ff; --muted:#9a9ecb; --faint:#5f6491;
  --accent:#7c8cff; --accent-ink:#0a0c22; --accent-soft:rgba(124,140,255,.16);
  --good:#5ce0b0; --warn:#ffd166; --bad:#ff6b8a;
  --radius:12px; --radius-sm:9px;
  --shadow:0 18px 50px rgba(0,0,0,.55); --panel-shadow:none;
  --texture:none; --tile-bg:var(--panel); --avatar-radius:10px;
}
body[data-theme="nord"]{ /* Arctic Frost */
  --font-ui:'Manrope',system-ui,sans-serif; --font-display:'Manrope',sans-serif;
  --bg:#242933; --surface:#2e3440; --panel:#3b4252; --panel2:#434c5e; --rail:#272c36;
  --border:#434c5e; --border-soft:#3b4252;
  --text:#eceff4; --muted:#9aa5b8; --faint:#6c7689;
  --accent:#88c0d0; --accent-ink:#10222b; --accent-soft:rgba(136,192,208,.16);
  --good:#a3be8c; --warn:#ebcb8b; --bad:#bf616a;
  --radius:10px; --radius-sm:7px; --avatar-radius:8px;
  --shadow:0 18px 50px rgba(0,0,0,.45); --panel-shadow:none; --texture:none;
}
body[data-theme="ember"]{ /* Ember Carbon */
  --font-ui:'Sora',system-ui,sans-serif; --font-display:'Sora',sans-serif;
  --bg:#131110; --surface:#1b1917; --panel:#242019; --panel2:#2d2820; --rail:#171412;
  --border:#3a332a; --border-soft:#2a251f;
  --text:#f0e9e0; --muted:#b3a596; --faint:#7a6d5d;
  --accent:#ff7a45; --accent-ink:#2a1005; --accent-soft:rgba(255,122,69,.15);
  --good:#8fbf6a; --warn:#f0b429; --bad:#f05e5e;
  --radius:8px; --radius-sm:6px; --avatar-radius:7px;
  --shadow:0 18px 50px rgba(0,0,0,.55); --panel-shadow:none;
  --texture:radial-gradient(circle at 90% 0%,rgba(255,122,69,.06),transparent 50%);
}
body[data-theme="rose"]{ /* Rosé Dusk */
  --font-ui:'Manrope',system-ui,sans-serif; --font-display:'Spectral',serif;
  --bg:#16141f; --surface:#1f1d2e; --panel:#26233a; --panel2:#2f2b45; --rail:#1a1826;
  --border:#322e4a; --border-soft:#26233a;
  --text:#e0def4; --muted:#a8a3c4; --faint:#6e6a8a;
  --accent:#ebbcba; --accent-ink:#2a1a20; --accent-soft:rgba(235,188,186,.15);
  --good:#9ccfd8; --warn:#f6c177; --bad:#eb6f92;
  --radius:12px; --radius-sm:9px; --avatar-radius:10px;
  --shadow:0 18px 50px rgba(0,0,0,.5); --panel-shadow:none; --texture:none;
}
body[data-theme="mint"]{ /* Signal Mint */
  --font-ui:'Chakra Petch',sans-serif; --font-display:'Chakra Petch',sans-serif;
  --bg:#08100d; --surface:#0c1613; --panel:#111f1a; --panel2:#16271f; --rail:#0a1310;
  --border:#1e3329; --border-soft:#162720;
  --text:#dbf5e9; --muted:#7fae9b; --faint:#4d7160;
  --accent:#3ddc84; --accent-ink:#04160d; --accent-soft:rgba(61,220,132,.14);
  --good:#3ddc84; --warn:#e8c15a; --bad:#f0616d;
  --radius:8px; --radius-sm:6px; --avatar-radius:7px;
  --shadow:0 18px 50px rgba(0,0,0,.55); --panel-shadow:none;
  --texture:linear-gradient(rgba(61,220,132,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(61,220,132,.03) 1px,transparent 1px);
}
body[data-theme="porcelain"]{ /* Porcelain (light) */
  --font-ui:'Manrope',system-ui,sans-serif; --font-display:'Manrope',sans-serif;
  --bg:#ece9e2; --surface:#ffffff; --panel:#ffffff; --panel2:#f5f2ec; --rail:#f6f3ed;
  --border:#e6e1d6; --border-soft:#efebe2;
  --text:#211f1b; --muted:#6b665c; --faint:#a49d8d;
  --accent:#1f6f5c; --accent-ink:#ffffff; --accent-soft:rgba(31,111,92,.12);
  --good:#2f8f5b; --warn:#bd8321; --bad:#c0453b;
  --radius:10px; --radius-sm:7px; --avatar-radius:8px;
  --shadow:0 16px 44px rgba(40,36,28,.14); --panel-shadow:0 1px 3px rgba(40,36,28,.05);
  --texture:none;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-ui);background:#0a0c10;color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;display:flex;flex-direction:column}

.ctl{background:#15181e;color:#e7e9ec;padding:9px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:50;flex-wrap:wrap}
.ctl .h{font-family:'Sora',sans-serif;font-weight:700;font-size:12.5px}
.ctl .tag{font-size:11px;color:#8b93a0}
.themebar{display:flex;gap:5px;margin-left:auto;background:#20242c;padding:4px;border-radius:9px}
.themebar button{font-family:'Sora',sans-serif;font-size:12px;font-weight:600;padding:7px 13px;border-radius:6px;border:none;background:transparent;color:#9aa2ad;cursor:pointer;transition:.15s}
.themebar button:hover{color:#fff}
.themebar button.on{background:#2dd4bf;color:#04231f}

.stage{flex:1;display:grid;place-items:center;padding:20px;min-height:0;background:var(--bg);transition:background .3s}

.win{width:600px;max-width:96%;height:min(600px,90%);background:var(--surface);border:1px solid var(--border);border-radius:calc(var(--radius) + 2px);box-shadow:var(--shadow);display:flex;overflow:hidden;position:relative;transition:.3s}

.rail{width:62px;background:var(--rail);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 0;overflow-y:auto;flex-shrink:0}
.railsearch{width:40px;height:40px;border-radius:var(--radius-sm);display:grid;place-items:center;font-size:15px;color:var(--muted);background:var(--panel2);border:1px solid var(--border-soft);cursor:pointer;flex-shrink:0}
.railsearch:hover{color:var(--accent);border-color:var(--accent)}
.raildiv{width:26px;height:1px;background:var(--border);margin:3px 0;flex-shrink:0}
.rdot{width:40px;height:40px;border-radius:var(--radius-sm);display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--muted);background:var(--panel2);cursor:pointer;position:relative;flex-shrink:0;transition:.12s;font-family:var(--font-display)}
.rdot:hover{color:var(--text)}
.rdot.on{background:var(--accent);color:var(--accent-ink)}
.rdot.on::before{content:"";position:absolute;left:-10px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--accent)}
.rdot .rrun{position:absolute;top:-2px;right:-2px;width:12px;height:12px;border-radius:50%;background:var(--good);border:2px solid var(--rail)}
.rdot .rerr{position:absolute;top:-2px;right:-2px;width:12px;height:12px;border-radius:50%;background:var(--bad);border:2px solid var(--rail)}
.railgap{flex:1}
.railadd{width:40px;height:40px;border-radius:var(--radius-sm);display:grid;place-items:center;font-size:18px;color:var(--faint);background:transparent;border:1px dashed var(--border);cursor:pointer;flex-shrink:0}
.railadd:hover{color:var(--accent);border-color:var(--accent)}

.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;background-image:var(--texture);background-size:auto,auto,26px 26px,26px 26px}
.grow{flex:1}
.titlebar{display:flex;align-items:center;gap:10px;padding:9px 10px 9px 13px;border-bottom:1px solid var(--border-soft);flex-shrink:0}
.logo{width:27px;height:27px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#000));color:var(--accent-ink);display:grid;place-items:center;font-weight:800;font-size:12px;flex-shrink:0;font-family:var(--font-display)}
.tbteam{display:flex;align-items:baseline;gap:9px;min-width:0}
.tbteam .tnm{font-size:16px;font-weight:800;white-space:nowrap;font-family:var(--font-display);letter-spacing:.2px}
.tbteam .tmt{font-size:11px;color:var(--muted);white-space:nowrap}
.tbteam .tmt b{color:var(--accent);font-weight:700}.tbteam .tmt b.err{color:var(--bad)}
.drag{align-self:stretch;cursor:grab}
.wc{width:24px;height:24px;border-radius:5px;color:var(--faint);cursor:pointer;display:grid;place-items:center;font-size:12px}
.wc:hover{background:var(--panel2);color:var(--text)}.wc.close:hover{background:var(--bad);color:#fff}

.actionrow{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border-soft);flex-shrink:0}
.btnp{background:var(--accent);color:var(--accent-ink);border:none;border-radius:var(--radius-sm);padding:10px 15px;font-size:12.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;white-space:nowrap;flex:1;font-family:var(--font-ui);transition:.15s}
.btnp:hover{filter:brightness(1.08)}.btnp:disabled{opacity:.75;cursor:default}.btnp.busy{background:var(--warn);color:#3a2a05}
.ic{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--panel2);color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:14px;flex-shrink:0;position:relative;transition:.15s}
.ic:hover{color:var(--accent);border-color:var(--accent)}
.ic.live{border-color:var(--warn);color:var(--warn)}
.ic.live::after{content:"";position:absolute;inset:-3px;border-radius:calc(var(--radius-sm) + 3px);border:2px solid var(--warn);opacity:.5;animation:pulse 1.3s infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.5}70%{transform:scale(1.16);opacity:0}100%{opacity:0}}
.ic .cbadge{position:absolute;top:-5px;right:-5px;min-width:15px;height:15px;border-radius:8px;background:var(--warn);color:#3a2a05;font-size:9px;font-weight:800;display:grid;place-items:center;padding:0 3px;border:2px solid var(--surface)}
.ic .cbadge.err{background:var(--bad);color:#fff}

.spin{width:13px;height:13px;border-radius:50%;border:2px solid color-mix(in srgb,var(--accent-ink) 40%,transparent);border-top-color:var(--accent-ink);animation:sp .7s linear infinite;display:inline-block}
.spin.dark{border-color:var(--accent-soft);border-top-color:var(--accent)}
@keyframes sp{to{transform:rotate(360deg)}}

.banner{display:none;align-items:center;gap:12px;padding:10px 14px;background:color-mix(in srgb,var(--warn) 14%,var(--surface));border-bottom:1px solid color-mix(in srgb,var(--warn) 30%,var(--border));flex-shrink:0}
.banner.show{display:flex}
.banner.err{background:color-mix(in srgb,var(--bad) 14%,var(--surface));border-bottom-color:color-mix(in srgb,var(--bad) 32%,var(--border))}
.banner .bicon{width:26px;height:26px;border-radius:var(--radius-sm);background:var(--warn);color:#3a2a05;display:grid;place-items:center;flex-shrink:0}
.banner.err .bicon{background:var(--bad);color:#fff}
.banner .bt{flex:1;min-width:0}.banner .bt .l1{font-size:12.5px;font-weight:700}
.banner .bt .l2{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.banner .bar{height:6px;border-radius:6px;background:color-mix(in srgb,var(--warn) 25%,var(--border));overflow:hidden;margin-top:5px}
.banner .bar i{display:block;height:100%;background:var(--warn);border-radius:6px;transition:width .3s}
.banner.err .bar i{background:var(--bad)}
.banner .cancel{font-size:11px;color:var(--text);border:1px solid var(--border);background:var(--panel2);border-radius:6px;padding:6px 10px;cursor:pointer;font-weight:600}

.area{flex:1;overflow-y:auto;padding:12px 14px 14px}
.gA{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.tile{border:1px solid var(--border);border-radius:var(--radius);padding:10px;display:flex;flex-direction:column;gap:9px;background:var(--tile-bg);box-shadow:var(--panel-shadow);transition:.18s}
.tile:hover{border-color:var(--accent)}
.tile.launching{border-color:var(--warn)}.tile.running{border-color:color-mix(in srgb,var(--good) 55%,var(--border))}.tile.error{border-color:var(--bad)}
.top{display:flex;align-items:center;gap:9px}
.av{width:34px;height:34px;border-radius:var(--avatar-radius);flex-shrink:0;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12.5px;font-family:var(--font-display)}
.nm2{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info{font-size:10.5px;color:var(--muted);font-family:var(--font-mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex-shrink:0}
.sdot.run{background:var(--good);box-shadow:0 0 0 3px color-mix(in srgb,var(--good) 25%,transparent)}
.sdot.launch{background:var(--warn);box-shadow:0 0 0 3px color-mix(in srgb,var(--warn) 25%,transparent)}
.sdot.error{background:var(--bad);box-shadow:0 0 0 3px color-mix(in srgb,var(--bad) 25%,transparent)}
.stepline{font-size:10.5px;color:var(--warn);display:flex;align-items:center;gap:6px;font-weight:600}
.errline{font-size:10.5px;color:var(--bad);font-weight:600}
.acts{display:flex;align-items:center;gap:5px}
.run{background:var(--accent);color:var(--accent-ink);border:none;border-radius:var(--radius-sm);font-weight:700;cursor:pointer;padding:7px;font-size:11.5px;flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.run.stop{background:color-mix(in srgb,var(--bad) 18%,var(--panel));color:var(--bad)}
.run.wait{background:color-mix(in srgb,var(--warn) 18%,var(--panel));color:var(--warn)}
.run.retry{background:color-mix(in srgb,var(--bad) 15%,var(--panel));color:var(--bad)}
.ib{width:30px;height:30px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);border-radius:var(--radius-sm);cursor:pointer;display:grid;place-items:center}
.ib:hover{color:var(--accent);border-color:var(--accent)}
.toggles{display:flex;gap:4px;margin-left:auto}.tog{font-size:9.5px;font-weight:800;border-radius:5px;padding:3px 6px}
.tog.on{background:var(--accent-soft);color:var(--accent)}.tog.off{background:var(--panel2);color:var(--faint)}

/* side panel editor */
.edscrim{position:absolute;inset:0;background:rgba(0,0,0,.28);display:none;z-index:29}
.edscrim.open{display:block}
.edside{position:absolute;top:0;right:0;bottom:0;width:340px;max-width:82%;background:var(--surface);border-left:1px solid var(--border);box-shadow:-16px 0 44px rgba(0,0,0,.4);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s;z-index:30}
.edside.open{transform:translateX(0)}
.edh{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--border-soft);flex-shrink:0}
.edh .l1{font-size:14px;font-weight:800;font-family:var(--font-display)}.edh .l2{font-size:11px;color:var(--muted)}
.edh .x{margin-left:auto;color:var(--muted);cursor:pointer;font-size:16px}
.edbody{overflow-y:auto;padding:16px;flex:1}
.form{display:flex;flex-direction:column;gap:16px}
.fsec{display:flex;flex-direction:column;gap:9px}
.fsec h4{font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--faint);font-weight:700}
.frow{display:flex;flex-direction:column;gap:4px}
.frow>label{font-size:11.5px;font-weight:600;color:var(--muted)}
.in{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-size:12.5px;font-family:var(--font-ui);color:var(--text);outline:none}
.in:focus{border-color:var(--accent)}
.inrow{display:flex;gap:7px}.inrow .in{flex:1}
.browse{background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
.browse:hover{border-color:var(--accent);color:var(--accent)}
.switchrow{display:flex;align-items:center;gap:10px;padding:4px 0}
.switchrow span{flex:1;font-size:12.5px;color:var(--text);font-weight:600}.switchrow .hint{color:var(--faint);font-weight:400;font-size:11px}
.sw{width:38px;height:22px;border-radius:20px;background:var(--panel2);border:1px solid var(--border);cursor:pointer;position:relative;transition:.15s;flex-shrink:0}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--muted);transition:.15s}
.sw.on{background:var(--accent);border-color:var(--accent)}.sw.on::after{left:18px;background:var(--accent-ink)}
.edf{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border-soft);flex-shrink:0}
.edf .save{flex:1;background:var(--accent);color:var(--accent-ink);border:none;border-radius:var(--radius-sm);padding:10px;font-size:12.5px;font-weight:700;cursor:pointer}
.edf .cancel{background:var(--panel2);color:var(--muted);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 16px;font-size:12.5px;font-weight:600;cursor:pointer}
.edf .del{background:color-mix(in srgb,var(--bad) 14%,var(--panel));color:var(--bad);border:1px solid color-mix(in srgb,var(--bad) 30%,var(--border));border-radius:var(--radius-sm);padding:10px 14px;font-size:12.5px;font-weight:600;cursor:pointer}

/* console + search overlays */
.ov{position:absolute;inset:0;background:rgba(0,0,0,.34);display:none;justify-content:center;align-items:center;z-index:28;padding:16px}
.ov.open{display:flex}
.ovtop{align-items:flex-start;padding-top:40px}
.conpanel{width:480px;max-width:100%;height:76%;background:color-mix(in srgb,var(--surface) 80%,#000);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border)}
.conpanel .ch{display:flex;align-items:center;gap:8px;padding:12px 15px;border-bottom:1px solid var(--border-soft)}
.conpanel .chh{color:var(--muted);font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;font-weight:700}
.conpanel .live{display:flex;align-items:center;gap:5px;color:var(--good);font-size:10.5px;font-weight:600}
.conpanel .live .p{width:6px;height:6px;border-radius:50%;background:var(--good);animation:pl 1.5s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.conpanel .x{margin-left:auto;color:var(--muted);cursor:pointer;font-size:16px}
.logbody{flex:1;padding:8px 15px 14px;overflow-y:auto;font-family:var(--font-mono);font-size:11.5px;line-height:1.8}
.ln{color:var(--muted);white-space:nowrap}.ln .t{color:var(--faint);margin-right:9px}
.ln.ok{color:var(--good)}.ln.warn{color:var(--warn)}.ln.acc{color:var(--accent)}.ln.err{color:var(--bad);font-weight:600}
.gspanel{width:440px;max-width:92%;max-height:78%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
.gsin{display:flex;align-items:center;gap:9px;padding:13px 15px;border-bottom:1px solid var(--border-soft)}
.gsin input{border:none;outline:none;font-size:14px;font-family:var(--font-ui);color:var(--text);flex:1;background:none}
.gsres{overflow-y:auto;padding:6px}
.gsgroup{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);font-weight:700;padding:9px 10px 4px}
.gsrow{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer}
.gsrow:hover{background:var(--panel2)}
.gsrow .team{margin-left:auto;font-size:10px;color:var(--muted);background:var(--panel2);border:1px solid var(--border-soft);border-radius:5px;padding:2px 7px}

/* neon extras */
body[data-theme="neon"] .rail,body[data-theme="neon"] .tile,body[data-theme="neon"] .edside{backdrop-filter:blur(10px)}
body[data-theme="neon"] .logo,body[data-theme="neon"] .btnp{box-shadow:0 0 18px var(--accent-soft)}
body[data-theme="neon"] .rdot.on,body[data-theme="neon"] .sdot.run{box-shadow:0 0 12px currentColor}

::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
</style>
</head>
<body data-theme="indigo">
  <div class="ctl">
    <span class="h">Py4GW Launcher — pick a visual direction</span>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#c9a6a0;cursor:pointer;user-select:none"><input type="checkbox" id="failToggle" style="width:15px;height:15px;accent-color:#e05555"> simulate a failure</label>
    <div class="themebar" id="themebar">
      <button data-t="indigo" class="on">Indigo Aurora</button>
      <button data-t="nord">Arctic Frost</button>
      <button data-t="ember">Ember Carbon</button>
      <button data-t="rose">Rosé Dusk</button>
      <button data-t="mint">Signal Mint</button>
      <button data-t="porcelain">Porcelain</button>
    </div>
  </div>

  <div class="stage"><div class="win">
    <div class="rail" id="rail"></div>
    <div class="main">
      <div class="titlebar"><div class="logo">4</div><div class="tbteam"><span class="tnm" id="tnm">Team Alpha</span><span class="tmt" id="tmt"></span></div><div class="grow drag"></div><span class="wc">&#8211;</span><span class="wc">&#9633;</span><span class="wc close">&#10005;</span></div>
      <div class="actionrow">
        <button class="btnp" id="launchBtn" onclick="launchTeam()">&#9654; Launch Team</button>
        <button class="ic" title="Add character" onclick="openEdit(null)">&#65291;</button>
        <button class="ic" title="Stop team" onclick="stopTeam()">&#9632;</button>
        <button class="ic" id="conIcon" title="Console" onclick="openPanel()">&#128220;</button>
        <button class="ic" title="Settings">&#9881;</button>
      </div>
      <div class="banner" id="banner"></div>
      <div class="area" id="area"></div>
      <div class="edscrim" id="edscrim" onclick="closeEdit()"></div>
      <div class="edside" id="edside"></div>
    </div>
    <div class="ov ovtop" id="conov" onclick="if(event.target===this)closePanel()"><div class="conpanel"><div class="ch"><span class="chh">Console</span><span id="plive"></span><span class="x" onclick="closePanel()">&#10005;</span></div><div class="logbody" id="panelLog"></div></div></div>
    <div class="ov ovtop" id="gsov" onclick="if(event.target===this)closeGS()"><div class="gspanel"><div class="gsin">&#128269;<input id="gsq" placeholder="Search characters across all teams…"></div><div class="gsres" id="gsres"></div></div></div>
  </div></div>

<script>
const TEAMS={
 "Team Alpha":["Aldric Vale|GW-01|combat.py","Bryn Ashford|GW-02|combat.py","Caden Rho|GW-03|combat.py","Dara Fenn|GW-04|combat.py","Eira Voss|GW-05|combat.py","Faelan Ide|GW-06|combat.py","Gwen Ostro|GW-07|combat.py","Hale Quinn|GW-08|combat.py"],
 "Team Bravo":["Ivo Marsh|GW-01|farm.py","Juno Pell|GW-02|farm.py","Kira Nolt|GW-03|farm.py","Lorn Vex|GW-04|farm.py","Mira Dane|GW-05|farm.py","Nyx Orwell|GW-06|farm.py","Orin Sable|GW-07|farm.py","Petra Lune|GW-08|farm.py"],
 "Team Charlie":["Quen Ardo|GW-01|—","Rhys Calder|GW-02|support.py","Sable Wren|GW-03|support.py","Tavi Brooke|GW-04|support.py","Ula Frost|GW-05|support.py","Vale Reyn|GW-06|support.py","Wyn Tover|GW-07|support.py","Xander Poe|GW-08|support.py"],
 "Team Delta":["Yara Sol|GW-09|—","Zeph Kade|GW-10|—","Aria Nell|GW-11|—","Bodhi Ray|GW-12|—"],
 "Team Echo":["Cleo Vantz|GW-13|idle.py","Dorian Ash|GW-14|idle.py","Esme Cardo|GW-15|idle.py","Finn Alder|GW-16|idle.py","Greer Vale|GW-17|idle.py","Hollis Kerr|GW-18|idle.py"]
};
const NAMES=Object.keys(TEAMS);
const AV=["#e0736f","#3aa79a","#7d76d6","#d69a3a","#46b07f","#4c9bd0","#d67f4c","#c95faf"];
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h}
function ini(n){const p=(n||'?').trim().split(/\s+/);return((p[0]||"")[0]||"")+((p[1]||"")[0]||"")}
function avatar(nm,big){return `<div class="av" style="background:${AV[hash(nm||'?')%AV.length]}${big?';width:44px;height:44px;font-size:16px':''}">${(ini(nm)||'?').toUpperCase()}</div>`}
function pencil(){return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>'}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
let clk=43201;const _st={};function stamp(k){if(!(k in _st)){clk+=2;_st[k]=`12:${String(Math.floor(clk/60)%60).padStart(2,'0')}:${String(clk%60).padStart(2,'0')}`}return _st[k]}

let team="Team Alpha",ST={},STEP={},launching=false,cancel=false,cur="",nextIn=0,everError=false,seenLog=0,editIdx=null;
let LOG=[],logId=0;
NAMES.forEach(t=>TEAMS[t].forEach(s=>ST[s.split('|')[0]]='idle'));
function log(m,c=''){LOG.push({id:logId++,m,c})}
log("Welcome to Py4GW!","");log("Teams loaded from accounts.json","acc");
function runningCount(){return Object.values(ST).filter(s=>s==='running').length}
function errorCount(){return Object.values(ST).filter(s=>s==='error').length}

function tileHTML(s){const[nm,cl,sc]=s.split('|');const st=ST[nm];
 const dot=st==='running'?'run':st==='launching'?'launch':st==='error'?'error':'';
 let action;
 if(st==='launching')action=`<button class="run wait" disabled><span class="spin"></span>${STEP[nm]||'…'}</button>`;
 else if(st==='running')action=`<button class="run stop" onclick="ST['${nm}']='idle';log('${nm} stopped','warn');render()">&#9632; Stop</button>`;
 else if(st==='error')action=`<button class="run retry" onclick="single('${nm}')">&#8635; Retry</button>`;
 else action=`<button class="run" onclick="single('${nm}')">&#9654; Launch</button>`;
 const mid=st==='launching'?`<div class="stepline"><span class="spin dark"></span>${STEP[nm]}</div>`:st==='error'?`<div class="errline">&#9888; injection failed</div>`:`<div class="info">${cl} &middot; ${sc}</div>`;
 return `<div class="tile ${st}"><div class="top">${avatar(nm)}<div style="min-width:0;flex:1"><div class="nm2">${nm}</div>${mid}</div><span class="sdot ${dot}"></span></div>
   <div class="acts">${action}<button class="ib" onclick="openEdit(IDX('${nm}'))">${pencil()}</button><div class="toggles"><span class="tog on">P4</span><span class="tog off">BB</span><span class="tog off">gM</span></div></div></div>`;
}
function IDX(nm){return TEAMS[team].findIndex(s=>s.split('|')[0]===nm)}
function logLines(){return LOG.slice(-250).map(l=>`<div class="ln ${l.c}"><span class="t">${stamp(l.id)}</span>${l.m}</div>`).join('')}

function render(){
 document.getElementById('rail').innerHTML=`<div class="railsearch" onclick="openGS()">&#128269;</div><div class="raildiv"></div>`+
   NAMES.map(n=>{const r=TEAMS[n].some(s=>ST[s.split('|')[0]]==='running');const er=TEAMS[n].some(s=>ST[s.split('|')[0]]==='error');return `<div class="rdot ${n===team?'on':''}" title="${n}" onclick="team='${n}';closeEdit();render()">${ini(n).toUpperCase()}${er?'<span class="rerr"></span>':r?'<span class="rrun"></span>':''}</div>`}).join('')+
   `<div class="railgap"></div><div class="railadd" title="Add team">&#65291;</div>`;
 const list=TEAMS[team];const rc=runningCount(),ec=errorCount();
 document.getElementById('tnm').textContent=team;
 document.getElementById('tmt').innerHTML=`${list.length} characters${rc?` &middot; <b>${rc} running</b>`:''}${ec?` &middot; <b class="err">${ec} failed</b>`:''}`;
 document.getElementById('area').innerHTML=`<div class="gA">${list.map(tileHTML).join('')}</div>`;
 const lb=document.getElementById('launchBtn');lb.disabled=launching;lb.classList.toggle('busy',launching);
 lb.innerHTML=launching?`<span class="spin"></span> Launching… ${rc}/${list.length}`:'&#9654; Launch Team';
 const b=document.getElementById('banner');
 if(launching){const pct=Math.round(rc/list.length*100);const l2=nextIn>0?`Idling ${nextIn}s to avoid login throttle…`:(cur?`${cur} — ${STEP[cur]||''}`:'');
   b.className='banner show'+(everError?' err':'');
   b.innerHTML=`<div class="bicon">${everError?'&#9888;':'<span class="spin"></span>'}</div><div class="bt"><div class="l1">Launching ${team} — ${rc}/${list.length}${ec?` · ${ec} failed`:''}</div><div class="l2">${l2}</div><div class="bar"><i style="width:${pct}%"></i></div></div><button class="cancel" onclick="cancel=true">Cancel</button>`;
 }else if(ec){b.className='banner show err';b.innerHTML=`<div class="bicon">&#9888;</div><div class="bt"><div class="l1">${ec} client${ec>1?'s':''} failed</div><div class="l2">Open the console for details, or Retry on the tile.</div></div><button class="cancel" onclick="document.getElementById('banner').classList.remove('show')">Dismiss</button>`;}
 else{b.className='banner';b.innerHTML='';}
 const ic=document.getElementById('conIcon');const nu=LOG.length-seenLog;const open=document.getElementById('conov').classList.contains('open');
 ic.classList.toggle('live',launching&&!everError);
 ic.innerHTML='&#128220;'+(nu>0&&!open?`<span class="cbadge ${everError?'err':''}">${nu}</span>`:'');
 if(open){document.getElementById('panelLog').innerHTML=logLines();document.getElementById('plive').innerHTML=launching?'<span class="live"><span class="p"></span>live</span>':'';const p=document.getElementById('panelLog');p.scrollTop=p.scrollHeight;seenLog=LOG.length;}
}

/* edit side panel */
function formHTML(c){const nm=c?c.split('|')[0]:'',cl=c?c.split('|')[1]:'',sc=c?c.split('|')[2]:'';const slug=(nm||'newchar').toLowerCase().replace(/\s+/g,'.');
 return `<div class="form">
   <div class="fsec"><h4>Identity</h4>
     <div class="frow"><label>Character name</label><input class="in" value="${nm}" placeholder="e.g. Aldric Vale"></div>
     <div class="frow"><label>Email</label><input class="in" value="${nm?slug+'@example.com':''}" placeholder="account@email.com"></div>
     <div class="frow"><label>Password</label><div class="inrow"><input class="in" type="password" value="" placeholder="••••••••"><button class="browse" onclick="const i=this.previousElementSibling;i.type=i.type==='password'?'text':'password'">Show</button></div></div></div>
   <div class="fsec"><h4>Guild Wars client</h4>
     <div class="frow"><label>Gw.exe path</label><div class="inrow"><input class="in" value="${nm?'C:/Games/GuildWars/'+(cl?cl:'Client')+'/Gw.exe':''}" placeholder="C:/Games/Guild Wars/Gw.exe"><button class="browse">Browse…</button></div></div>
     <div class="frow"><label>Rename client window</label><input class="in" value="${cl==='—'?'':cl}" placeholder="optional"></div>
     <div class="frow"><label>Extra launch args</label><input class="in" placeholder="-optional -flags"></div>
     <div class="switchrow"><span>Run as administrator</span><button class="sw" onclick="this.classList.toggle('on')"></button></div></div>
   <div class="fsec"><h4>Automation</h4>
     <div class="frow"><label>Auto-run script at launch</label><div class="inrow"><input class="in" value="${sc==='—'?'':sc}" placeholder="none"><button class="browse">Browse…</button></div></div>
     <div class="switchrow"><span>Inject Py4GW <span class="hint">bot core</span></span><button class="sw on" onclick="this.classList.toggle('on')"></button></div>
     <div class="switchrow"><span>Inject BlackBox</span><button class="sw" onclick="this.classList.toggle('on')"></button></div>
     <div class="switchrow"><span>Inject gMod <span class="hint">textures</span></span><button class="sw" onclick="this.classList.toggle('on')"></button></div></div></div>`;
}
function openEdit(i){editIdx=i;const c=i===null?null:TEAMS[team][i];const isNew=i===null;const nm=c?c.split('|')[0]:'';
 document.getElementById('edside').innerHTML=
   `<div class="edh">${avatar(nm,true)}<div><div class="l1">${nm||'New character'}</div><div class="l2">${nm?'Editing · '+team:'Add to '+team}</div></div><span class="x" onclick="closeEdit()">&#10005;</span></div>
    <div class="edbody">${formHTML(c)}</div>
    <div class="edf">${isNew?'':'<button class="del">Delete</button>'}<button class="cancel" onclick="closeEdit()">Cancel</button><button class="save" onclick="closeEdit()">${isNew?'Add character':'Save changes'}</button></div>`;
 document.getElementById('edside').classList.add('open');document.getElementById('edscrim').classList.add('open');
}
function closeEdit(){editIdx=null;document.getElementById('edside').classList.remove('open');document.getElementById('edscrim').classList.remove('open')}

/* console + search */
function openPanel(){document.getElementById('conov').classList.add('open');seenLog=LOG.length;render();const p=document.getElementById('panelLog');p.scrollTop=p.scrollHeight}
function closePanel(){document.getElementById('conov').classList.remove('open');render()}
function openGS(){document.getElementById('gsov').classList.add('open');document.getElementById('gsq').value='';gsR('');document.getElementById('gsq').focus()}
function closeGS(){document.getElementById('gsov').classList.remove('open')}
function gsR(q){q=q.toLowerCase().trim();let out='',any=false;
 for(const[tn,list] of Object.entries(TEAMS)){const hits=list.map(s=>s.split('|')).filter(([nm,,sc])=>!q||nm.toLowerCase().includes(q)||tn.toLowerCase().includes(q)||sc.toLowerCase().includes(q));if(!hits.length)continue;any=true;
   out+=`<div class="gsgroup">${tn}</div>`+hits.map(([nm,cl,sc])=>`<div class="gsrow" onclick="team='${tn}';closeGS();render()">${avatar(nm)}<div style="min-width:0"><div class="nm2">${nm}</div><div class="info">${cl} &middot; ${sc}</div></div><span class="team">${tn}</span></div>`).join('');}
 document.getElementById('gsres').innerHTML=any?out:`<div class="gsgroup" style="padding:20px;text-align:center">No matches</div>`;
}
document.getElementById('gsq').addEventListener('input',e=>gsR(e.target.value));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeGS();closePanel();closeEdit()}});

/* launch sim */
async function launchSeq(names,label){launching=true;cancel=false;everError=false;
 const failMode=document.getElementById('failToggle').checked;const failIdx=failMode&&names.length>2?2:-1;
 if(label)log(`Launching team: ${team}`,'acc');render();
 for(let i=0;i<names.length;i++){if(cancel){log('Launch cancelled','warn');break}cur=names[i];ST[cur]='launching';log(`— ${cur}`,'acc');
   for(const[txt,cls] of [['Patching client…',''],['Multiclient patch applied','ok'],['Waiting for GW window…',''],['Injecting Py4GW.dll…','']]){if(cancel)break;STEP[cur]=txt;log(`${cur}: ${txt}`,cls);render();await sleep(320)}
   if(cancel){ST[cur]='idle';break}
   if(i===failIdx){everError=true;ST[cur]='error';STEP[cur]='';log(`${cur}: Py4GW injection FAILED — remote thread returned 0`,'err');log(`${cur}: skipping, continuing team…`,'warn');if(!document.getElementById('conov').classList.contains('open'))openPanel();render();await sleep(750)}
   else{ST[cur]='running';STEP[cur]='';log(`${cur}: Py4GW injection successful`,'ok');render()}
   if(i<names.length-1){for(nextIn=3;nextIn>0;nextIn--){if(cancel)break;render();await sleep(420)}nextIn=0}}
 if(!cancel&&label)log(`Finished launching team: ${team}${errorCount()?` (${errorCount()} failed)`:''}`,errorCount()?'warn':'ok');launching=false;cur='';nextIn=0;render();}
function launchTeam(){if(launching)return;launchSeq(TEAMS[team].map(s=>s.split('|')[0]),true)}
function single(nm){if(launching)return;ST[nm]='idle';launchSeq([nm],false)}
function stopTeam(){TEAMS[team].forEach(s=>{const nm=s.split('|')[0];if(ST[nm]==='running'){ST[nm]='idle';log(`${nm} stopped`,'warn')}});render()}

const tb=document.getElementById('themebar');
tb.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;document.body.dataset.theme=b.dataset.t;[...tb.children].forEach(x=>x.classList.toggle('on',x===b))});
render();
</script>
</body>
</html>
